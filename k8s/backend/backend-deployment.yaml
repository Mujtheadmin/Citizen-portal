apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: citizen-portal

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: mujtheadmin/desc-backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          envFrom:
            - secretRef:
                name: backend-secret

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
